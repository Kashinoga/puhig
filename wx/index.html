<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>WX — Pocket Universe</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../puhig.css" />
    <link rel="stylesheet" href="../phosphor.css" />
    <link rel="stylesheet" href="wx.css" />
    <script src="../puhig.js" defer></script>
    <script src="wx.js" defer></script>
  </head>

  <body>
    <div id="mosaic-bg" data-mosaic-align="left" data-mosaic-grid-only><div class="mosaic-overlay"></div></div>
    <div class="container panel">
      <main>
        <section data-row="wx">
          <div class="panel-frame card-sleeve panel-row-start" data-row="wx" data-wx-slot="cover" data-portal="wx">
            <div class="panel-content card">
              <div class="card-frame card-frame--cover">
                <div class="card-cover-art" data-target="24" data-mosaic-align="left" data-mosaic-palette="teal" data-mosaic-static>
                  <div class="mosaic-overlay card-mosaic"></div>
                </div>
                <div class="card-cover-top">
                  <div class="card-title card-title--cover">
                    <span class="card-name">WX</span>
                    <div class="card-cost">
                      <span class="card-pip" style="background: var(--teal)"></span>
                    </div>
                  </div>
                </div>
                <div class="card-cover-bottom">
                  <div class="card-footer card-footer--cover">
                    <div class="card-footer-left">
                      <span class="card-number">WX 000</span>
                      <div class="card-metadata">
                        <span class="card-set-abbreviation">NWS</span>
                        <span class="card-language">EN</span>
                      </div>
                    </div>
                    <div class="card-footer-right">
                      <i class="card-rarity ph-fill ph-cloud-sun" data-rarity="landmark"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-back">
              <i class="ph ph-planet"></i>
            </div>
          </div>
          <div class="panel-frame card-sleeve" data-row="wx" data-wx-slot="about">
            <div class="panel-content card">
              <div class="card-frame">
                <div class="card-title">
                  <span class="card-name">About</span>
                  <div class="card-cost">
                    <span class="card-pip" style="background: var(--teal)"></span>
                  </div>
                </div>
                <div class="card-art" data-mosaic-type="ca" data-target="24" data-mosaic-align="left" data-mosaic-palette="teal" data-mosaic-static>
                  <div class="mosaic-overlay card-mosaic"></div>
                </div>
                <div class="card-type">
                  <span class="card-type-label">WX</span>
                  <i class="card-rarity ph-fill ph-cloud-sun" data-rarity="stable"></i>
                </div>
                <div class="card-text-box">
                  <p>A weather app using data from the U.S. National Weather Service <a href="https://www.weather.gov" target="_blank" rel="noopener"><span class="external-link-icon"><i class="ph ph-arrow-square-out"></i></span></a>.</p>
                </div>
                <div class="card-footer">
                  <div class="card-footer-left">
                    <span class="card-number">WX 001</span>
                    <div class="card-metadata">
                      <span class="card-set-abbreviation">NWS</span>
                    </div>
                  </div>
                  <div class="card-footer-right">
                    <span class="card-version">v0.2</span>
                    <div class="card-credit">
                      <span class="card-language">EN</span>
                      <span class="card-author">Atelier Kashinoga</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-back">
              <i class="ph ph-planet"></i>
            </div>
          </div>
          <div class="panel-frame card-sleeve" data-row="wx" data-wx-slot="location">
            <div class="panel-content card">
              <div class="card-frame">
                <div class="card-title">
                  <span class="card-name">Location</span>
                  <div class="card-cost">
                    <span class="card-pip" style="background: var(--teal)"></span>
                  </div>
                </div>
                <div class="card-art" data-mosaic-type="ca" data-target="24" data-mosaic-align="left" data-mosaic-palette="green" data-mosaic-static>
                  <div class="mosaic-overlay card-mosaic"></div>
                </div>
                <div class="card-type">
                  <span class="card-type-label">WX — State</span>
                  <i class="card-rarity ph-fill ph-map-pin" data-rarity="stable"></i>
                </div>
                <div class="card-text-box">
                  <div class="select-field">
                    <div class="select">
                      <select id="wx-state" aria-label="State">
                        <option value="" selected disabled>Choose a state</option>
                      </select>
                      <i class="select-chevron ph ph-caret-down"></i>
                    </div>
                  </div>
                </div>
                <div class="card-footer">
                  <div class="card-footer-left">
                    <span class="card-number">WX 002</span>
                    <div class="card-metadata">
                      <span class="card-set-abbreviation">NWS</span>
                    </div>
                  </div>
                  <div class="card-footer-right">
                    <div class="card-credit">
                      <span class="card-language">EN</span>
                      <span class="card-author">Atelier Kashinoga</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-back">
              <i class="ph ph-planet"></i>
            </div>
          </div>
          <!-- The forecast card (WX 003) and the station card (WX 004) are created
               here on selection — the fourth and fifth masthead cards to the right;
               both empty (idle) on load. -->
          <section id="wx-forecast" data-row="wx"></section>
          <section id="wx-station" data-row="wx"></section>
          <section id="wx-results" data-row="wx" aria-live="polite"></section>
        </section>
      </main>
    </div>
    <!-- Super area: the fixed bottom-left control cluster (shared .scroll-controls
         chrome). On a sub-app the leading control is Back — an <a>, so it's real
         navigation; the same-origin nav reverses the cover-card portal, morphing
         the WX cover back into its slot in the HIG deck. -->
    <div class="scroll-controls">
      <a
        class="panel-frame scroll-control"
        id="scroll-back-btn"
        href="../index.html"
        aria-label="Back to the Human Interface Guidelines"
      >
        <span class="toggle-body">
          <i class="ph-light ph-squares-four"></i>
        </span>
      </a>
      <button
        class="panel-frame scroll-control"
        id="appearance-toggle"
        aria-label="Appearance"
      >
        <span class="toggle-body">
          <i class="ph-light ph-circle-half"></i>
        </span>
      </button>
    </div>
  </body>
</html>
