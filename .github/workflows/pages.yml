name: Deploy Pages

# Builds the Pages site from `main` at the root. (The `card-layout` preview was
# retired once that branch merged into main.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; queue them instead of cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main → site root
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Strip git/workflow dirs from the artifact
        run: rm -rf site/.git site/.github

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
